name: Build Test APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'App.js'
      - 'app.json'
      - 'package.json'
      - 'package-lock.json'
      - 'components/**'
      - 'config/**'
      - 'context/**'
      - 'screens/**'
      - 'services/**'
      - '.github/workflows/build-test-apk.yml'

permissions:
  contents: read

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out app
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Run app tests
        run: npm test

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Build installable debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Locksmith-Knowledge-Engine-V3-Test.apk

      - name: Upload test APK
        uses: actions/upload-artifact@v4
        with:
          name: Locksmith-Knowledge-Engine-V3-Test-APK
          path: output/Locksmith-Knowledge-Engine-V3-Test.apk
          if-no-files-found: error
          retention-days: 14
