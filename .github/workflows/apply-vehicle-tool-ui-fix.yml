name: Apply Vehicle Tool UI Fix

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/apply_vehicle_tool_ui_fix.py'
      - 'services/vehicleDisplayAdapter.js'
      - '.github/workflows/apply-vehicle-tool-ui-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply UI fix
        run: python tools/apply_vehicle_tool_ui_fix.py

      - name: Validate JavaScript syntax
        run: |
          node --check screens/VehicleScreen.js
          node --check components/OperationSection.js
          node --check services/vehicleDisplayAdapter.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screens/VehicleScreen.js components/OperationSection.js services/vehicleDisplayAdapter.js
          if git diff --cached --quiet; then
            echo "UI fix already applied."
            exit 0
          fi
          git commit -m "fix: make owned tools and Ford programming data display correctly"
          git push
