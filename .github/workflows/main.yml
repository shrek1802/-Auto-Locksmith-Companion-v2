name: Build and Publish Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-and-publish-android-apk
  cancel-in-progress: false

jobs:
  build:
    name: Build APK and publish to database repo
    runs-on: ubuntu-latest

    steps:
      - name: Check out app repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Align Expo SDK dependencies
        run: |
          npx expo install --fix
          npx expo install expo-font

      - name: Check Expo project
        run: npx expo-doctor

      - name: Validate bundled app data
        run: npm run check

      - name: Test packaged database updater
        run: npm test

      - name: Generate automatic app build number
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BUILD_CODE=$((100000 + GITHUB_RUN_NUMBER))
          APP_VERSION=$(node -p "require('./app.json').expo.version || require('./package.json').version")
          SAFE_VERSION=$(echo "$APP_VERSION" | tr -cd '0-9A-Za-z._-')
          APK_NAME="Locksmith-Companion-Pro-v${SAFE_VERSION}-build-${BUILD_CODE}.apk"

          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const buildCode = Number(process.argv[1]);
            app.expo = app.expo || {};
            app.expo.android = app.expo.android || {};
            app.expo.ios = app.expo.ios || {};
            app.expo.android.versionCode = buildCode;
            app.expo.ios.buildNumber = String(buildCode);
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          " "$BUILD_CODE"

          echo "app_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_code=$BUILD_CODE" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

          echo "Version: $SAFE_VERSION"
          echo "Android versionCode: $BUILD_CODE"
          echo "APK name: $APK_NAME"

      - name: Generate Android project
        run: CI=1 npx expo prebuild --platform android --clean

      - name: Remove unreliable Sonatype snapshot repository
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          roots = [Path('android'), Path('node_modules')]
          patterns = ('*.gradle', '*.gradle.kts')
          changed = []

          for root in roots:
              if not root.exists():
                  continue
              files = []
              for pattern in patterns:
                  files.extend(root.rglob(pattern))
              for path in files:
                  try:
                      text = path.read_text(encoding='utf-8')
                  except (UnicodeDecodeError, OSError):
                      continue
                  lines = text.splitlines()
                  filtered = [
                      line for line in lines
                      if 'oss.sonatype.org/content/repositories/snapshots' not in line
                  ]
                  if filtered != lines:
                      path.write_text('\n'.join(filtered) + '\n', encoding='utf-8')
                      changed.append(str(path))

          print(f'Removed Sonatype snapshots from {len(changed)} Gradle file(s).')
          for path in changed:
              print(path)
          PY

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug and release APKs with dependency retry
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Gradle build attempt $attempt of 3"
            if ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Build failed; clearing failed dependency state before retry."
              ./gradlew --stop || true
              rm -rf ~/.gradle/caches/modules-2/files-2.1/com.facebook.fresco || true
              rm -rf ~/.gradle/caches/modules-2/files-2.1/com.facebook.react || true
              rm -rf ~/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin || true
              sleep $((attempt * 20))
            fi
          done
          exit 1

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
            "output/${{ steps.version.outputs.apk_name }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "output/Locksmith-Companion-Pro-v${{ steps.version.outputs.app_version }}-build-${{ steps.version.outputs.build_code }}-debug.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Locksmith-Companion-Pro-build-${{ steps.version.outputs.build_code }}
          path: |
            output/${{ steps.version.outputs.apk_name }}
            output/Locksmith-Companion-Pro-v${{ steps.version.outputs.app_version }}-build-${{ steps.version.outputs.build_code }}-debug.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 30

      - name: Check out database repository
        uses: actions/checkout@v4
        with:
          repository: shrek1802/locksmith-companion-database
          token: ${{ secrets.DATABASE_REPO_TOKEN }}
          path: database-repo
          ref: main

      - name: Publish APK and update metadata
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          BUILD_CODE: ${{ steps.version.outputs.build_code }}
          APK_NAME: ${{ steps.version.outputs.apk_name }}
        run: |
          set -euo pipefail

          APK_DIR="database-repo/APK"
          mkdir -p "$APK_DIR"

          if [ -f "$APK_DIR/APK" ]; then
            rm -f "$APK_DIR/APK"
          fi

          cp "output/$APK_NAME" "$APK_DIR/$APK_NAME"
          cp "output/$APK_NAME" "$APK_DIR/latest.apk"

          node -e "
            const fs = require('fs');
            const outputPath = process.argv[1];
            const payload = {
              schema_version: '1.0',
              version: process.env.APP_VERSION,
              build: Number(process.env.BUILD_CODE),
              android_version_code: Number(process.env.BUILD_CODE),
              filename: 'latest.apk',
              versioned_filename: process.env.APK_NAME,
              download_url: 'https://raw.githubusercontent.com/shrek1802/locksmith-companion-database/main/APK/latest.apk',
              published_at: new Date().toISOString(),
              source_commit: process.env.GITHUB_SHA
            };
            fs.writeFileSync(outputPath, JSON.stringify(payload, null, 2) + '\n');
          " "$APK_DIR/latest.json"

          find "$APK_DIR" -maxdepth 1 -type f \
            -name 'Locksmith-Companion-Pro-v*-build-*.apk' \
            -printf '%T@ %p\n' \
            | sort -nr \
            | awk 'NR>5 {print $2}' \
            | xargs -r rm -f

      - name: Commit APK to database repository
        working-directory: database-repo
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add APK/

          if git diff --cached --quiet; then
            echo "No APK changes to commit."
            exit 0
          fi

          git commit -m "Publish Android APK v${{ steps.version.outputs.app_version }} build ${{ steps.version.outputs.build_code }}"
          git push origin main
