name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Align Expo SDK dependencies
        run: npx expo install --fix

      - name: Check Expo project
        run: npx expo-doctor

      - name: Validate database files
        run: npm run check

      - name: Generate Android project
        run: CI=1 npx expo prebuild --platform android --clean

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
             output/Locksmith-Companion-Pro-v2.0.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Locksmith-Companion-Pro-v2.0.0
          path: output/Locksmith-Companion-Pro-v2.0.0.apk
          if-no-files-found: error
          retention-days: 30
