name: Trim Programmer Settings

on:
  push:
    branches: [main]
    paths:
      - 'tools/trim_programmer_settings.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply trimmed settings
        run: python tools/trim_programmer_settings.py
      - name: Validate app
        run: |
          npm install
          npm run check
      - name: Commit app changes
        run: |
          if git diff --quiet; then
            echo 'No settings changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add screens/SettingsScreen.js app.json
          git commit -m 'app: trim programmer settings catalogue'
          git push
